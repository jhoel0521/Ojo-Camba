name: "Bug — Error o defecto"
description: Reportar un error o comportamiento inesperado en el sistema.
labels: ["bug"]
body:
  - type: dropdown
    id: componente
    attributes:
      label: Componente afectado
      options:
        - "gateway-principal"
        - "gateway-status"
        - "ms-auth"
        - "ms-register"
        - "ms-admin"
        - "ms-gamify"
        - "app-reporte (PWA)"
        - "app-backoffice"
        - "app-tecnico"
        - "app-status"
        - "Base de datos / PostGIS"
        - "MinIO"
        - "Infraestructura / Docker"
    validations:
      required: true

  - type: dropdown
    id: severidad
    attributes:
      label: Severidad
      options:
        - "Crítica — sistema no funciona"
        - "Alta — funcionalidad principal bloqueada"
        - "Media — funcionalidad degradada, hay workaround"
        - "Baja — cosmético o caso borde"
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Hacer...
        3. Ver error...
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Capturas
      description: Pega logs relevantes o adjunta capturas de pantalla.
      render: shell
    validations:
      required: false
