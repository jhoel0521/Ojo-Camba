name: ojo-camba-infra

networks:
  ojo-camba-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ojocamba
      POSTGRES_USER: ojocamba
      POSTGRES_PASSWORD: ojocamba_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ojocamba"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ojocamba
      MINIO_ROOT_PASSWORD: ojocamba_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/reportes;
      echo 'Bucket reportes listo';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ojocamba
      MINIO_ROOT_PASSWORD: ojocamba_secret
    networks:
      - ojo-camba-net
    depends_on:
      minio:
        condition: service_healthy
