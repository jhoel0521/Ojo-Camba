name: ojo-camba-dev

networks:
  ojo-camba-net:
    driver: bridge

volumes:
  postgres_data:
  seaweedfs_data:

services:

  # ── Infraestructura ─────────────────────────────────────────
  postgres:
    build:
      context: ../..
      dockerfile: docker/infra/Dockerfile.postgres-h3
    environment:
      POSTGRES_DB: ojocamba
      POSTGRES_USER: ojocamba
      POSTGRES_PASSWORD: ojocamba_secret
    volumes:
      - ../../docker/infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ojocamba"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -filer -dir /data
    volumes:
      - seaweedfs_data:/data
    ports:
      - "9010:8333"
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8333/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Microservicios TCP (no exponen puerto al host) ──────────
  ms-auth:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.ms-auth
    volumes:
      - ../../backend/ms-auth/src:/app/backend/ms-auth/src
    environment:
      TCP_PORT: 3001
      DATABASE_URL: postgresql://ojocamba:ojocamba_secret@postgres:5432/ojocamba
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy

  ms-register:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.ms-register
    volumes:
      - ../../backend/ms-register/src:/app/backend/ms-register/src
    environment:
      TCP_PORT: 3002
      DATABASE_URL: postgresql://ojocamba:ojocamba_secret@postgres:5432/ojocamba
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ojocamba
      S3_SECRET_KEY: ojocamba_secret
      S3_BUCKET: reportes
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  ms-admin:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.ms-admin
    volumes:
      - ../../backend/ms-admin/src:/app/backend/ms-admin/src
    environment:
      TCP_PORT: 3003
      DATABASE_URL: postgresql://ojocamba:ojocamba_secret@postgres:5432/ojocamba
      MS_GAMIFY_HOST: ms-gamify
      MS_GAMIFY_PORT: 3004
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ojocamba
      S3_SECRET_KEY: ojocamba_secret
      S3_BUCKET: reportes
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  ms-gamify:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.ms-gamify
    volumes:
      - ../../backend/ms-gamify/src:/app/backend/ms-gamify/src
    environment:
      TCP_PORT: 3004
      DATABASE_URL: postgresql://ojocamba:ojocamba_secret@postgres:5432/ojocamba
      MS_AUTH_HOST: ms-auth
      MS_AUTH_PORT: 3001
      PUNTOS_POR_REPORTE_ACEPTADO: 10
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Gateways HTTP (exponen puerto al host) ──────────────
  gateway-principal:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.gateway-principal
    volumes:
      - ../../backend/gateway-principal/src:/app/backend/gateway-principal/src
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176
      MS_AUTH_HOST: ms-auth
      MS_AUTH_PORT: 3001
      MS_REGISTER_HOST: ms-register
      MS_REGISTER_PORT: 3002
      MS_ADMIN_HOST: ms-admin
      MS_ADMIN_PORT: 3003
      MS_GAMIFY_HOST: ms-gamify
      MS_GAMIFY_PORT: 3004
    networks:
      - ojo-camba-net
    depends_on:
      - ms-auth
      - ms-register
      - ms-admin
      - ms-gamify

  gateway-status:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.gateway-status
    volumes:
      - ../../backend/gateway-status/src:/app/backend/gateway-status/src
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://ojocamba:ojocamba_secret@postgres:5432/ojocamba
      MS_AUTH_HOST: ms-auth
      MS_AUTH_PORT: 3001
      MS_REGISTER_HOST: ms-register
      MS_REGISTER_PORT: 3002
      MS_ADMIN_HOST: ms-admin
      MS_ADMIN_PORT: 3003
      MS_GAMIFY_HOST: ms-gamify
      MS_GAMIFY_PORT: 3004
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy
      ms-auth:
        condition: service_started
      ms-register:
        condition: service_started
      ms-admin:
        condition: service_started
      ms-gamify:
        condition: service_started

  # ── Frontend Vite dev servers ────────────────────────────────
  app-reporte:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.app-reporte
    volumes:
      - ../../frontend/app-reporte/src:/app/frontend/app-reporte/src
      - ../../frontend/app-reporte/public:/app/frontend/app-reporte/public
    ports:
      - "5173:5173"
    networks:
      - ojo-camba-net

  app-backoffice:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.app-backoffice
    volumes:
      - ../../frontend/app-backoffice/src:/app/frontend/app-backoffice/src
      - ../../frontend/app-backoffice/public:/app/frontend/app-backoffice/public
    ports:
      - "5174:5174"
    networks:
      - ojo-camba-net

  app-tecnico:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.app-tecnico
    volumes:
      - ../../frontend/app-tecnico/src:/app/frontend/app-tecnico/src
      - ../../frontend/app-tecnico/public:/app/frontend/app-tecnico/public
    ports:
      - "5175:5175"
    networks:
      - ojo-camba-net

  app-status:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.app-status
    volumes:
      - ../../frontend/app-status/src:/app/frontend/app-status/src
      - ../../frontend/app-status/public:/app/frontend/app-status/public
    ports:
      - "5176:5176"
    networks:
      - ojo-camba-net
