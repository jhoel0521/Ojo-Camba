name: ojo-camba-prod

networks:
  ojo-camba-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:

  # ── Infraestructura ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ojocamba}
      POSTGRES_USER: ${POSTGRES_USER:-ojocamba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ojocamba}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio_data:/data
    networks:
      - ojo-camba-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Microservicios TCP ───────────────────────────────────────
  ms-auth:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.ms-auth
    restart: unless-stopped
    environment:
      TCP_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy

  ms-register:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.ms-register
    restart: unless-stopped
    environment:
      TCP_PORT: 3002
      DATABASE_URL: ${DATABASE_URL:?required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?required}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:-reportes}
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  ms-admin:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.ms-admin
    restart: unless-stopped
    environment:
      TCP_PORT: 3003
      DATABASE_URL: ${DATABASE_URL:?required}
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy

  ms-gamify:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.ms-gamify
    restart: unless-stopped
    environment:
      TCP_PORT: 3004
      DATABASE_URL: ${DATABASE_URL:?required}
    networks:
      - ojo-camba-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Gateways ─────────────────────────────────────────────
  gateway-principal:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.gateway-principal
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      PORT: 3000
      MS_AUTH_HOST: ms-auth
      MS_AUTH_PORT: 3001
      MS_REGISTER_HOST: ms-register
      MS_REGISTER_PORT: 3002
      MS_ADMIN_HOST: ms-admin
      MS_ADMIN_PORT: 3003
      MS_GAMIFY_HOST: ms-gamify
      MS_GAMIFY_PORT: 3004
    networks:
      - ojo-camba-net
    depends_on:
      - ms-auth
      - ms-register
      - ms-admin
      - ms-gamify

  gateway-status:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.gateway-status
    restart: unless-stopped
    ports:
      - "${STATUS_PORT:-3005}:3005"
    environment:
      PORT: 3005
      MS_AUTH_HOST: ms-auth
      MS_AUTH_PORT: 3001
      MS_REGISTER_HOST: ms-register
      MS_REGISTER_PORT: 3002
      MS_ADMIN_HOST: ms-admin
      MS_ADMIN_PORT: 3003
      MS_GAMIFY_HOST: ms-gamify
      MS_GAMIFY_PORT: 3004
    networks:
      - ojo-camba-net
    depends_on:
      - ms-auth
      - ms-register
      - ms-admin
      - ms-gamify

  # ── Frontend (nginx + static) ────────────────────────────────
  app-reporte:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.app-reporte
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    restart: unless-stopped
    ports:
      - "${REPORTE_PORT:-8080}:80"
    networks:
      - ojo-camba-net

  app-backoffice:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.app-backoffice
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    restart: unless-stopped
    ports:
      - "${BACKOFFICE_PORT:-8081}:80"
    networks:
      - ojo-camba-net

  app-tecnico:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.app-tecnico
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    restart: unless-stopped
    ports:
      - "${TECNICO_PORT:-8082}:80"
    networks:
      - ojo-camba-net

  app-status:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.app-status
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    restart: unless-stopped
    ports:
      - "${STATUS_FRONTEND_PORT:-8083}:80"
    networks:
      - ojo-camba-net
